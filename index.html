<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tu Boleto | Timeline</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="m-0 bg-white text-slate-900">
  <main class="w-full p-6">
    <header class="flex flex-wrap items-end gap-4">
      <div>
        <h1 class="mb-1.5 text-2xl font-bold">Ticket availability</h1>
        <p id="summary" class="m-0 text-slate-500"></p>
      </div>
    </header>
    <div id="charts" class="mt-6 grid grid-cols-1 gap-x-6 gap-y-7 md:grid-cols-2 xl:grid-cols-3"></div>
    <div id="empty" class="hidden py-20 text-center text-slate-500">
      There are no observations in the history yet.
    </div>
    <div class="mt-3 flex flex-wrap gap-5 text-sm">
      <span class="inline-flex items-center gap-2">
        <span class="h-2.5 w-2.5 rounded-full bg-red-600"></span>
        Tickets sold
      </span>
      <span class="inline-flex items-center gap-2">
        <span class="h-2.5 w-2.5 rounded-full bg-green-600"></span>
        Tickets available
      </span>
    </div>
  </main>
  <footer class="px-6 pb-6 text-center text-xs text-slate-500">
    <a
      href="https://marco-carvalho.github.io/machu-picchu-ticket-availability/"
      class="hover:text-slate-900 hover:underline"
    >
      https://marco-carvalho.github.io/machu-picchu-ticket-availability/
    </a>
  </footer>
  <script>
    let history = [];
    const charts = document.querySelector('#charts');
    const empty = document.querySelector('#empty');
    const summary = document.querySelector('#summary');
    const series = [
      {
        key: 'ingressosDisponiveis',
        color: '#16a34a',
        lower: () => 0,
        upper: item => item.values.ingressosDisponiveis
      },
      {
        key: 'ingressosVendidos',
        color: '#dc2626',
        lower: item => item.values.ingressosDisponiveis,
        upper: item => item.values.ingressosDisponiveis + item.values.ingressosVendidos
      }
    ];
    const svgElement = (name, attributes = {}) => {
      const element = document.createElementNS('http://www.w3.org/2000/svg', name);
      for (const [key, value] of Object.entries(attributes)) element.setAttribute(key, value);
      return element;
    };

    function linearPath(points, includeMove = true) {
      if (points.length === 0) return '';
      let path = includeMove ? 'M ' + points[0].x + ' ' + points[0].y : '';

      for (let index = 1; index < points.length; index++) {
        path += ' L ' + points[index].x + ' ' + points[index].y;
      }

      return path;
    }

    function drawChart(chart, observations) {
      const width = Math.max(Math.round(chart.getBoundingClientRect().width), 240);
      const height = 280;
      chart.setAttribute('viewBox', '0 0 ' + width + ' ' + height);
      const margin = { top: 8, right: 44, bottom: 44, left: 40 };
      const innerWidth = width - margin.left - margin.right;
      const innerHeight = height - margin.top - margin.bottom;
      const maxValue = Math.max(
        1,
        ...observations.map(item =>
          item.values.ingressosVendidos + item.values.ingressosDisponiveis
        )
      );
      const yInterval = maxValue <= 100 ? 10 : 100;
      const yMax = Math.ceil(maxValue / yInterval) * yInterval || maxValue;
      const x = index => observations.length === 1
        ? margin.left + innerWidth / 2
        : margin.left + index * innerWidth / (observations.length - 1);
      const y = value => margin.top + innerHeight - value * innerHeight / yMax;

      for (let tick = 0; tick <= 5; tick++) {
        const value = yMax * tick / 5;
        const position = y(value);
        chart.append(svgElement('line', {
          x1: margin.left,
          x2: width - margin.right,
          y1: position,
          y2: position,
          class: 'stroke-slate-200 [stroke-width:1]'
        }));
        const label = svgElement('text', {
          x: margin.left - 12,
          y: position + 4,
          'text-anchor': 'end',
          class: 'fill-slate-500 text-[10px]'
        });
        label.textContent = Math.round(value);
        chart.append(label);
      }

      const labelIndexes = [...new Set([0, observations.length - 1])];
      for (const index of labelIndexes) {
        const textAnchor = observations.length === 1
          ? 'middle'
          : index === 0
            ? 'start'
            : index === observations.length - 1
              ? 'end'
              : 'middle';
        const label = svgElement('text', {
          x: x(index),
          y: height - 30,
          'text-anchor': textAnchor,
          class: 'fill-slate-500 text-[10px]'
        });
        const [date, time] = observations[index].time.toISOString().split('T');
        const dateLine = svgElement('tspan', { x: x(index), dy: 0 });
        dateLine.textContent = date;
        const timeLine = svgElement('tspan', { x: x(index), dy: 12 });
        timeLine.textContent = time.slice(0, 8) + ' UTC';
        label.append(dateLine, timeLine);
        chart.append(label);
      }

      for (const itemSeries of series) {
        const upperPoints = observations.map(
          (item, index) => ({ x: x(index), y: y(itemSeries.upper(item)) })
        );
        const lowerPoints = observations.map(
          (item, index) => ({ x: x(index), y: y(itemSeries.lower(item)) })
        );
        const reversedLowerPoints = [...lowerPoints].reverse();
        const areaPath =
          linearPath(upperPoints) +
          ' L ' + reversedLowerPoints[0].x + ' ' + reversedLowerPoints[0].y +
          linearPath(reversedLowerPoints, false) +
          ' Z';
        chart.append(svgElement('path', {
          d: areaPath, fill: itemSeries.color, class: '[stroke:none]'
        }));
      }

      const lastObservation = observations.at(-1);
      const valueLabelPositions = series.map(
        itemSeries => y(itemSeries.upper(lastObservation)) + 4
      );
      const minimumLabelGap = 14;
      if (Math.abs(valueLabelPositions[0] - valueLabelPositions[1]) < minimumLabelGap) {
        const topIndex = 1;
        const bottomIndex = 0;
        const midpoint = (valueLabelPositions[0] + valueLabelPositions[1]) / 2;
        let top = midpoint - minimumLabelGap / 2;
        let bottom = midpoint + minimumLabelGap / 2;
        const minimumY = margin.top + 12;
        const maximumY = margin.top + innerHeight;
        if (top < minimumY) {
          bottom += minimumY - top;
          top = minimumY;
        }
        if (bottom > maximumY) {
          top -= bottom - maximumY;
          bottom = maximumY;
        }
        valueLabelPositions[topIndex] = top;
        valueLabelPositions[bottomIndex] = bottom;
      }

      for (const [seriesIndex, itemSeries] of series.entries()) {
        const points = observations.map(
          (item, index) => ({ x: x(index), y: y(itemSeries.upper(item)) })
        );
        chart.append(svgElement('path', {
          d: linearPath(points),
          stroke: itemSeries.color,
          class: 'fill-none [stroke-linecap:butt] [stroke-linejoin:miter] [stroke-width:3]'
        }));
        observations.forEach((item, index) => {
          const circle = svgElement('circle', {
            cx: x(index),
            cy: y(itemSeries.upper(item)),
            r: 4,
            fill: itemSeries.color,
            class: 'stroke-white [stroke-width:2]'
          });
          const title = svgElement('title');
          title.textContent = item.time.toISOString() + ': ' + item.values[itemSeries.key];
          circle.append(title);
          chart.append(circle);
        });
        const valueLabel = svgElement('text', {
          x: width - margin.right + 8,
          y: valueLabelPositions[seriesIndex],
          fill: itemSeries.color,
          class: 'text-xs font-bold'
        });
        valueLabel.textContent = lastObservation.values[itemSeries.key];
        chart.append(valueLabel);
      }
    }

    function render() {
      charts.replaceChildren();
      const routeNames = [...new Set(history.flatMap(item => item.rotas.map(route => route.ruta)))].sort();
      const hasData = routeNames.length > 0;
      charts.style.display = hasData ? 'grid' : 'none';
      empty.style.display = hasData ? 'none' : 'block';
      if (!hasData) return;

      for (const routeName of routeNames) {
        const observations = history.flatMap(item => {
          const values = item.rotas.find(route => route.ruta === routeName);
          return values ? [{ time: new Date(item.horarioUtc), values }] : [];
        });
        const section = document.createElement('section');
        section.className = 'min-w-0';
        const title = document.createElement('h2');
        title.className = 'h-9 text-sm font-bold leading-[18px]';
        title.textContent = routeName;
        const chart = svgElement('svg', {
          role: 'img',
          'aria-label': 'Timeline for ' + routeName,
          class: 'block h-[280px] w-full overflow-visible'
        });
        section.append(title, chart);
        charts.append(section);
        drawChart(chart, observations);
      }

      const first = new Date(history[0].horarioUtc).toISOString();
      const last = new Date(history.at(-1).horarioUtc).toISOString();
      summary.textContent = history.length + ' observation(s) from ' + first + ' to ' + last;
    }

    async function loadHistory() {
      try {
        const response = await fetch('./index.json', { cache: 'no-store' });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();
        if (!Array.isArray(data)) throw new Error('the file contents must be an array');
        history = data;
        render();
      } catch (error) {
        charts.style.display = 'none';
        empty.style.display = 'block';
        empty.textContent = 'Could not load ticket history.';
        console.error(error);
      }
    }

    window.addEventListener('resize', render);
    loadHistory();
  </script>
</body>
</html>
