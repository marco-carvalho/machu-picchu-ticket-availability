<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tu Boleto | Timeline</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@6.1.0/dist/echarts.min.js"></script>
</head>
<body class="m-0 bg-white text-slate-900">
  <main class="w-full p-6">
    <header class="flex flex-wrap items-end gap-4">
      <div>
        <h1 class="mb-1.5 text-2xl font-bold">Ticket availability</h1>
        <p id="summary" class="m-0 text-slate-500"></p>
      </div>
    </header>
    <div id="charts" class="mt-6 grid grid-cols-1 gap-x-6 gap-y-7 md:grid-cols-2 xl:grid-cols-3"></div>
    <div id="empty" class="hidden py-20 text-center text-slate-500">
      There are no observations in the history yet.
    </div>
    <div class="mt-3 flex flex-wrap gap-5 text-sm">
      <span class="inline-flex items-center gap-2">
        <span class="h-2.5 w-2.5 rounded-full bg-red-600"></span>
        Tickets sold
      </span>
      <span class="inline-flex items-center gap-2">
        <span class="h-2.5 w-2.5 rounded-full bg-green-600"></span>
        Tickets available
      </span>
    </div>
  </main>
  <footer class="px-6 pb-6 text-center text-xs text-slate-500">
    <a
      href="https://marco-carvalho.github.io/machu-picchu-ticket-availability/"
    >
      https://marco-carvalho.github.io/machu-picchu-ticket-availability/
    </a>
  </footer>
  <script>
    let history = [];
    let chartInstances = [];
    const charts = document.querySelector('#charts');
    const empty = document.querySelector('#empty');
    const summary = document.querySelector('#summary');
    const peruTimestampFormatter = new Intl.DateTimeFormat('en-CA', {
      timeZone: 'America/Lima',
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hourCycle: 'h23'
    });
    const seriesDefinitions = [
      {
        name: 'Tickets available',
        key: 'ingressosDisponiveis',
        color: '#16a34a',
        labelOffset: 7
      },
      {
        name: 'Tickets sold',
        key: 'ingressosVendidos',
        color: '#dc2626',
        labelOffset: -7
      }
    ];

    function formatTimestamp(value, separator = '\n') {
      const parts = Object.fromEntries(
        peruTimestampFormatter
          .formatToParts(new Date(value))
          .map(part => [part.type, part.value])
      );
      return (
        parts.year + '-' + parts.month + '-' + parts.day +
        separator +
        parts.hour + ':' + parts.minute + ':' + parts.second
      );
    }

    function chartOptions(routeName, observations) {
      const capacity = Math.max(
        1,
        ...observations.map(
          item => item.values.ingressosVendidos + item.values.ingressosDisponiveis
        )
      );
      const interval = capacity <= 100 ? 10 : 100;
      const maximum = Math.ceil(capacity / interval) * interval;

      return {
        animation: false,
        aria: {
          enabled: true,
          description: 'Ticket availability timeline for ' + routeName
        },
        grid: {
          top: 18,
          right: 58,
          bottom: 8,
          left: 8,
          containLabel: true
        },
        xAxis: {
          type: 'time',
          boundaryGap: false,
          splitNumber: 2,
          axisLine: { lineStyle: { color: '#cbd5e1' } },
          axisTick: { show: false },
          axisLabel: {
            color: '#64748b',
            fontSize: 10,
            hideOverlap: true,
            formatter: value => formatTimestamp(value) + ' PET'
          },
          splitLine: { show: false }
        },
        yAxis: {
          type: 'value',
          min: 0,
          max: maximum,
          interval: maximum / 5,
          axisLine: { show: false },
          axisTick: { show: false },
          axisLabel: {
            color: '#64748b',
            fontSize: 10,
            formatter: value => Math.round(value)
          },
          splitLine: {
            lineStyle: { color: '#e2e8f0' }
          }
        },
        series: seriesDefinitions.map(definition => ({
          name: definition.name,
          type: 'line',
          stack: 'tickets',
          silent: true,
          smooth: false,
          showSymbol: true,
          symbol: 'circle',
          symbolSize: 7,
          data: observations.map(item => [
            item.time.getTime(),
            item.values[definition.key]
          ]),
          lineStyle: {
            color: definition.color,
            width: 3,
            cap: 'butt',
            join: 'miter'
          },
          itemStyle: {
            color: definition.color,
            borderColor: '#ffffff',
            borderWidth: 2
          },
          areaStyle: {
            color: definition.color,
            opacity: 1
          },
          endLabel: {
            show: true,
            color: definition.color,
            fontSize: 12,
            fontWeight: 700,
            distance: 8,
            offset: [0, definition.labelOffset],
            formatter: parameters => parameters.value[1]
          }
        }))
      };
    }

    function render() {
      for (const chart of chartInstances) chart.dispose();
      chartInstances = [];
      charts.replaceChildren();
      const routeNames = [...new Set(
        history.flatMap(item => item.rotas.map(route => route.ruta))
      )].sort();
      const hasData = routeNames.length > 0;
      charts.style.display = hasData ? 'grid' : 'none';
      empty.style.display = hasData ? 'none' : 'block';
      if (!hasData) return;

      for (const routeName of routeNames) {
        const observations = history.flatMap(item => {
          const values = item.rotas.find(route => route.ruta === routeName);
          return values ? [{ time: new Date(item.horarioUtc), values }] : [];
        });
        const section = document.createElement('section');
        section.className = 'min-w-0';
        const title = document.createElement('h2');
        title.className = 'h-9 text-sm font-bold leading-[18px]';
        title.textContent = routeName;
        const chartElement = document.createElement('div');
        chartElement.className = 'w-full';
        chartElement.style.height = '280px';
        chartElement.setAttribute('role', 'img');
        chartElement.setAttribute('aria-label', 'Timeline for ' + routeName);
        section.append(title, chartElement);
        charts.append(section);
        const chart = echarts.init(chartElement, null, { renderer: 'canvas' });
        chart.setOption(chartOptions(routeName, observations));
        chartInstances.push(chart);
      }

      const first = formatTimestamp(history[0].horarioUtc, ' ');
      const last = formatTimestamp(history.at(-1).horarioUtc, ' ');
      summary.textContent =
        history.length + ' observation(s) from ' + first + ' to ' + last + ' Peru time';
    }

    async function loadHistory() {
      try {
        const response = await fetch('./index.json', { cache: 'no-store' });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();
        if (!Array.isArray(data)) throw new Error('the file contents must be an array');
        history = data;
        render();
      } catch (error) {
        charts.style.display = 'none';
        empty.style.display = 'block';
        empty.textContent = 'Could not load ticket history.';
        console.error(error);
      }
    }

    window.addEventListener('resize', () => {
      for (const chart of chartInstances) chart.resize();
    });
    loadHistory();
  </script>
</body>
</html>
